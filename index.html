<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Terminal Elite v2.6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; --border: rgba(255, 255, 255, 0.1);
        }
        .light-mode {
            --bg: #f1f5f9; --card: rgba(255, 255, 255, 0.8); --text: #0f172a; --border: rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg); color: var(--text); transition: all 0.3s ease; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--border); }
        .favorited { color: #f59e0b !important; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        
        /* 讓表格在淺色模式下也清晰 */
        .light-mode .text-white { color: #0f172a !important; }
        .light-mode .text-slate-500 { color: #64748b !important; }
        .light-mode .bg-slate-900 { background: #ffffff !important; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="sticky top-0 z-50 glass px-6 py-4 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/30">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black italic tracking-tighter">MARGIN <span class="text-blue-500">PRO</span></h1>
                    <div id="update-tag" class="text-[10px] opacity-50 mono uppercase tracking-widest">v2.6.0 Live</div>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex gap-3 text-xs mono">
                    <span class="opacity-70">USD: <b id="r-u" class="text-emerald-500">--</b></span>
                    <span class="opacity-70">JPY: <b id="r-j" class="text-blue-500">--</b></span>
                </div>
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
                    <i id="theme-icon" class="fas fa-lightbulb text-yellow-400"></i>
                </button>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold text-sm transition-all shadow-lg shadow-blue-600/20 active:scale-95">
                    <i id="sync-icon" class="fas fa-sync-alt mr-1"></i> 同步
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 mt-8">
        <div class="mb-8">
            <input type="text" id="search" placeholder="搜尋商品名稱或代碼..." 
                class="w-full bg-slate-900 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-inner">
        </div>

        <div class="glass rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] uppercase tracking-widest opacity-50">
                        <tr>
                            <th class="px-8 py-5 text-center">追蹤</th>
                            <th class="px-8 py-5">商品資訊</th>
                            <th class="px-8 py-5">幣別</th>
                            <th class="px-8 py-5 text-right">大點價值</th>
                            <th class="px-8 py-5 text-right">原始保證金</th>
                            <th class="px-8 py-5 text-right bg-blue-500/10 text-blue-500">台幣估計</th>
                        </tr>
                    </thead>
                    <tbody id="list" class="divide-y divide-white/5">
                        <tr><td colspan="6" class="p-32 text-center opacity-50 italic">請按同步獲取雲端資料</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbznaiPus_QbMeKr-iuLSqcDvcxNuvuhB6RZrgK9VSeNh-IBskYRpCvaiugD24qXONM0/exec";
        let state = { 
            margins: [], 
            rates: {}, 
            favorites: JSON.parse(localStorage.getItem('favs') || '[]'),
            theme: localStorage.getItem('theme') || 'dark'
        };

        // 初始化主題
        if (state.theme === 'light') document.body.classList.add('light-mode');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            state.theme = isLight ? 'light' : 'dark';
            localStorage.setItem('theme', state.theme);
            document.getElementById('theme-icon').className = isLight ? 'fas fa-moon text-slate-400' : 'fas fa-lightbulb text-yellow-400';
        }

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                state.margins = data.margins;
                state.rates = data.rates;
                document.getElementById('r-u').innerText = data.rates.USD;
                document.getElementById('r-j').innerText = data.rates.JPY;
                document.getElementById('update-tag').innerText = "Last Sync: " + data.lastUpdate;
                render();
            } catch (e) { console.error(e); }
            finally { icon.classList.remove('fa-spin'); }
        }

        function toggleFav(id) {
            const idx = state.favorites.indexOf(id);
            if (idx > -1) state.favorites.splice(idx, 1);
            else state.favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(state.favorites));
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('list');
            
            const sorted = [...state.margins].sort((a, b) => {
                const aFav = state.favorites.includes(a.id) ? 0 : 1;
                const bFav = state.favorites.includes(b.id) ? 0 : 1;
                return aFav - bFav || a.id.localeCompare(b.id);
            });

            const filtered = sorted.filter(i => (i.name + i.id).toLowerCase().includes(q));

            container.innerHTML = filtered.map(item => {
                const isFav = state.favorites.includes(item.id);
                const rate = state.rates[item.cur] || 1;
                const twd = Math.round(item.margin * rate);
                return `
                    <tr class="hover:bg-blue-500/5 transition-all">
                        <td class="px-8 py-5 text-center">
                            <button onclick="toggleFav('${item.id}')" class="hover:scale-125 transition-transform">
                                <i class="fas fa-star ${isFav ? 'favorited' : 'opacity-20'}"></i>
                            </button>
                        </td>
                        <td class="px-8 py-5">
                            <div class="font-bold text-white">${item.name}</div>
                            <div class="text-[10px] mono opacity-50">${item.id}</div>
                        </td>
                        <td class="px-8 py-5 text-xs mono opacity-60">${item.cur}</td>
                        <td class="px-8 py-5 text-right text-xs opacity-60 italic">${item.pointVal}</td>
                        <td class="px-8 py-5 text-right mono font-bold">${item.margin.toLocaleString()}</td>
                        <td class="px-8 py-5 text-right bg-blue-500/5">
                            <div class="text-lg font-black text-blue-500 tracking-tighter">
                                <span class="text-[10px] mr-1 opacity-50">NT$</span>${twd.toLocaleString()}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', render);
        // 自動載入
        fetchData();
    </script>
</body>
</html>
