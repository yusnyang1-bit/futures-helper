<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Margin Conversion v1.9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen text-slate-200">

    <nav class="p-6 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter italic text-white">MARGIN <span class="text-indigo-400">v1.9.0</span></h1>
                    <p id="status-text" class="text-[10px] text-slate-500 font-mono uppercase tracking-tighter">Engine Standby</p>
                </div>
            </div>
            <div id="rates" class="flex gap-4 font-mono text-sm bg-slate-800/50 p-2 rounded-lg border border-slate-700">
                <span class="text-slate-400">USD <b id="r-usd" class="text-emerald-400">--</b></span>
                <span class="text-slate-400">JPY <b id="r-jpy" class="text-emerald-400">--</b></span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <div class="flex gap-4 mb-8">
            <input type="text" id="search" placeholder="搜尋商品 (NQ, MNQ, 銅...)" 
                class="flex-grow bg-slate-800 border-0 ring-1 ring-slate-700 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
            <button onclick="fetchData()" class="bg-indigo-600 hover:bg-indigo-500 px-8 rounded-2xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-indigo-600/20">
                <i id="sync-icon" class="fas fa-sync-alt"></i> 同步
            </button>
        </div>

        <div class="bg-slate-800/30 rounded-3xl border border-slate-800 overflow-hidden backdrop-blur-sm">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[11px] text-slate-500 uppercase tracking-widest bg-slate-800/50">
                        <th class="p-6">交易所商品 / 代碼</th>
                        <th class="p-6 text-right">幣別</th>
                        <th class="p-6 text-right">原始保證金</th>
                        <th class="p-6 text-right text-indigo-400 bg-indigo-400/5">台幣估計 (NTD)</th>
                    </tr>
                </thead>
                <tbody id="list" class="divide-y divide-slate-800">
                    <tr><td colspan="4" class="p-20 text-center text-slate-600">請點擊同步按鈕開始抓取最新數據...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyTSaf_Nl_JUPgUVNFTHtPowXPyET115hIWeCUq8bkpz1iWxw_xhFomkLUCCliwdpTQ_g/exec";

        let cache = { margins: [], rates: {} };

        async function fetchData() {
            const btnIcon = document.getElementById('sync-icon');
            btnIcon.classList.add('fa-spin');
            
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                
                cache = data;
                document.getElementById('r-usd').innerText = data.rates.USD;
                document.getElementById('r-jpy').innerText = data.rates.JPY;
                document.getElementById('status-text').innerText = "Last Sync: " + data.lastUpdate;

                render();
            } catch (e) {
                alert("抓取失敗！請確保 GAS 部署為『所有人』並使用最新 URL。");
            } finally {
                btnIcon.classList.remove('fa-spin');
            }
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('list');
            
            const filtered = cache.margins.filter(i => (i.name + i.id).toLowerCase().includes(q));

            container.innerHTML = filtered.map(item => {
                const twd = Math.round(item.margin * (cache.rates[item.cur] || 1));
                return `
                    <tr class="hover:bg-slate-700/30 transition-all">
                        <td class="p-6">
                            <div class="font-bold text-white">${item.name || '未知商品'}</div>
                            <div class="text-xs text-slate-500 font-mono tracking-tighter">${item.id}</div>
                        </td>
                        <td class="p-6 text-right font-mono text-slate-400">${item.cur}</td>
                        <td class="p-6 text-right font-mono font-bold text-slate-300">${item.margin.toLocaleString()}</td>
                        <td class="p-6 text-right text-xl font-black text-indigo-400 bg-indigo-400/5">
                            ${twd.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', render);
    </script>
</body>
</html>
