<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Conversion v1.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-black italic tracking-widest text-indigo-400">MARGIN CONVERSION</h1>
            <div id="rate-display" class="flex gap-4 font-mono text-sm bg-slate-800 px-4 py-2 rounded-xl border border-slate-700">
                載入中匯率...
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <div class="relative flex-grow">
                <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="搜尋全商品 (MNQ, NQ, 日經, 黃金)..." 
                    class="w-full pl-12 pr-4 py-3.5 rounded-2xl border-0 shadow-sm ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button onclick="fetchData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-bold transition flex items-center justify-center min-w-[140px]">
                <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 同步數據
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-400 text-xs uppercase">
                        <tr>
                            <th class="p-5">追蹤</th>
                            <th class="p-5">交易所 / 商品名稱</th>
                            <th class="p-5 text-right">大點價值</th>
                            <th class="p-5 text-right">原始保證金</th>
                            <th class="p-5 text-right bg-indigo-50 text-indigo-600">台幣估計</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 替換為你的 GAS URL
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxIEQVNQAgLT5IVLp_M7sizfCFBSqMER7yEVfecd1bLc0psuDZyD0XzTb8KQwGaJGYtWQ/exec"; 
        
        let localState = {
            margins: [],
            rates: { "USD": 32.5, "JPY": 0.21, "HKD": 4.15 },
            favs: JSON.parse(localStorage.getItem('mc_favs')) || []
        };

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            
            try {
                const response = await fetch(GAS_API_URL);
                const data = await response.json();
                
                localState.margins = data.margins;
                localState.rates = data.rates;
                
                renderRates();
                renderTable();
            } catch (e) {
                alert("抓取失敗，請確認 GAS 部署是否設為『所有人』");
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function renderRates() {
            document.getElementById('rate-display').innerHTML = `
                <span>USD: ${localState.rates.USD || '--'}</span>
                <span class="text-slate-600">|</span>
                <span>JPY: ${localState.rates.JPY || '--'}</span>
                <span class="text-slate-600">|</span>
                <span>HKD: ${localState.rates.HKD || '--'}</span>
            `;
        }

        function renderTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = localState.margins.filter(item => 
                item.name.toLowerCase().includes(query) || item.id.toLowerCase().includes(query)
            );

            tbody.innerHTML = filtered.map(item => {
                const twdValue = Math.round(item.margin * (localState.rates[item.cur] || 1));
                const isFav = localState.favs.includes(item.id);
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-5">
                            <i class="fas fa-star ${isFav ? 'text-yellow-400' : 'text-slate-100'} cursor-pointer" onclick="toggleFav('${item.id}')"></i>
                        </td>
                        <td class="p-5">
                            <div class="font-bold text-slate-800">${item.name}</div>
                            <div class="text-[10px] text-slate-400 font-mono">${item.id}</div>
                        </td>
                        <td class="p-5 text-right font-mono text-slate-500 text-sm">${item.pointVal}</td>
                        <td class="p-5 text-right font-mono font-bold text-slate-700">
                            <span class="text-[10px] text-slate-400 mr-1">${item.cur}</span>${item.margin.toLocaleString()}
                        </td>
                        <td class="p-5 text-right font-black text-indigo-700 bg-indigo-50/30 text-lg">
                            NT$ ${twdValue.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function toggleFav(id) {
            if (localState.favs.includes(id)) {
                localState.favs = localState.favs.filter(i => i !== id);
            } else {
                localState.favs.push(id);
            }
            localStorage.setItem('mc_favs', JSON.stringify(localState.favs));
            renderTable();
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        window.onload = fetchData;
    </script>
</body>
</html>
