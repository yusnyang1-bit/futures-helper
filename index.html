<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Elite v2.6.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root { --bg: #020617; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); --accent: #60a5fa; }
        .light-mode { --bg: #f1f5f9; --card: rgba(255, 255, 255, 0.9); --text: #0f172a; --border: rgba(0, 0, 0, 0.1); --accent: #2563eb; }

        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg); color: var(--text); transition: background 0.3s; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); }
        
        /* 凍結首列與滾動優化 */
        .table-container { overflow-x: auto; max-height: calc(100vh - 180px); overflow-y: auto; }
        thead th { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 2px solid var(--accent); }
        
        .favorited { color: #f59e0b !important; }
        
        /* 緊湊間距優化 */
        td, th { padding-left: 0.5rem !important; padding-right: 0.5rem !important; white-space: nowrap; }
        @media (max-width: 640px) {
            .compact-text { font-size: 0.75rem; }
            td { padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 glass px-4 py-3 shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg shadow-blue-500/30">
                    <i class="fas fa-bolt text-white text-sm"></i>
                </div>
                <h1 class="text-base font-black italic tracking-tighter">MARGIN <span class="text-blue-500">PRO</span></h1>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="hidden sm:flex gap-2 text-[10px] mono opacity-70">
                    <span>U: <b id="r-u">--</b></span>
                    <span>J: <b id="r-j">--</b></span>
                </div>
                <button onclick="toggleTheme()" class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center">
                    <i id="theme-icon" class="fas fa-lightbulb text-yellow-400 text-xs"></i>
                </button>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded-lg font-bold text-xs text-white">
                    <i id="sync-icon" class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-2 mt-4">
        <div class="mb-4">
            <input type="text" id="search" placeholder="搜尋商品名稱或代碼..." 
                class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
        </div>

        <div class="glass rounded-2xl overflow-hidden shadow-2xl">
            <div class="table-container">
                <table class="w-full text-left">
                    <thead class="text-sm font-bold uppercase tracking-wide">
                        <tr>
                            <th class="py-4 text-center w-10">★</th>
                            <th class="py-4">商品 (代碼)</th>
                            <th class="py-4">幣別</th>
                            <th class="py-4 text-right">大點</th>
                            <th class="py-4 text-right">原始</th>
                            <th class="py-4 text-right bg-blue-500/10">台幣換算</th>
                        </tr>
                    </thead>
                    <tbody id="list" class="divide-y divide-white/5 text-sm">
                        <tr><td colspan="6" class="p-20 text-center opacity-50">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbznaiPus_QbMeKr-iuLSqcDvcxNuvuhB6RZrgK9VSeNh-IBskYRpCvaiugD24qXONM0/exec";
        let state = { 
            margins: [], 
            rates: {}, 
            favorites: JSON.parse(localStorage.getItem('favs') || '[]'),
            theme: localStorage.getItem('theme') || 'dark'
        };

        if (state.theme === 'light') document.body.classList.add('light-mode');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            state.theme = isLight ? 'light' : 'dark';
            localStorage.setItem('theme', state.theme);
            document.getElementById('theme-icon').className = isLight ? 'fas fa-moon text-slate-400' : 'fas fa-lightbulb text-yellow-400';
        }

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                state.margins = data.margins;
                state.rates = data.rates;
                document.getElementById('r-u').innerText = data.rates.USD;
                document.getElementById('r-j').innerText = data.rates.JPY;
                render();
            } catch (e) { console.error(e); }
            finally { icon.classList.remove('fa-spin'); }
        }

        function toggleFav(id) {
            const idx = state.favorites.indexOf(id);
            if (idx > -1) state.favorites.splice(idx, 1);
            else state.favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(state.favorites));
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('list');
            
            const sorted = [...state.margins].sort((a, b) => {
                const aFav = state.favorites.includes(a.id) ? 0 : 1;
                const bFav = state.favorites.includes(b.id) ? 0 : 1;
                return aFav - bFav || a.id.localeCompare(b.id);
            });

            const filtered = sorted.filter(i => (i.name + i.id).toLowerCase().includes(q));

            container.innerHTML = filtered.map(item => {
                const isFav = state.favorites.includes(item.id);
                const rate = state.rates[item.cur] || 1;
                const twd = Math.round(item.margin * rate);
                return `
                    <tr class="hover:bg-blue-500/5 transition-all">
                        <td class="py-3 text-center">
                            <button onclick="toggleFav('${item.id}')" class="text-xs">
                                <i class="fas fa-star ${isFav ? 'favorited' : 'opacity-10'}"></i>
                            </button>
                        </td>
                        <td class="py-3">
                            <div class="font-bold text-sm leading-tight">${item.name}</div>
                            <div class="text-[10px] mono opacity-40">${item.id}</div>
                        </td>
                        <td class="py-3 text-[10px] mono opacity-60">${item.cur}</td>
                        <td class="py-3 text-right text-[10px] opacity-60 mono">${item.pointVal}</td>
                        <td class="py-3 text-right text-xs mono font-medium">${item.margin.toLocaleString()}</td>
                        <td class="py-3 text-right bg-blue-500/5">
                            <div class="text-sm font-black text-blue-500 tracking-tighter">
                                ${twd.toLocaleString()}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', render);
        fetchData();
    </script>
</body>
</html>
