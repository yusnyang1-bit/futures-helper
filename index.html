<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Master Elite v2.6.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        :root { 
            --bg: #020617; --nav: #0f172a; --card: #1e293b; --text: #f8fafc; 
            --border: #334155; --accent: #2563eb; --price: #60a5fa; --subtext: #94a3b8;
        }
        .light-mode { 
            --bg: #f8fafc; --nav: #ffffff; --card: #ffffff; --text: #0f172a; 
            --border: #e2e8f0; --accent: #3b82f6; --price: #1d4ed8; --subtext: #64748b;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.1; overflow: hidden; transition: background 0.2s; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 凍結首列與滾動優化 */
        .table-container { overflow-x: auto; height: calc(100vh - 130px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        thead th { 
            position: sticky; top: -1px; z-index: 30; 
            background: var(--accent); color: #ffffff; 
            font-size: 1.1rem; padding: 12px 6px !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* 緊湊間距 */
        td { padding: 12px 6px !important; border-bottom: 1px solid var(--border); }
        .favorited { color: #fbbf24 !important; filter: drop-shadow(0 0 5px rgba(251,191,36,0.4)); }

        /* 浮動同步按鈕 (FAB) */
        .fab {
            position: fixed; bottom: 30px; right: 25px;
            width: 65px; height: 65px; border-radius: 50%;
            background: var(--accent); color: #ffffff;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; transition: transform 0.2s, background 0.2s;
        }
        .fab:active { transform: scale(0.9); }

        /* 風格切換鈕 */
        .theme-btn { 
            width: 50px; height: 50px; border-radius: 14px; 
            border: 2px solid var(--border); display: flex; 
            align-items: center; justify-content: center; font-size: 1.4rem;
            background: var(--nav); transition: all 0.2s;
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 px-4 py-4 border-b-2 border-blue-600 shadow-lg" style="background: var(--nav);">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black italic text-xl tracking-tighter leading-none mb-1">MARGIN <span class="text-blue-500 font-black">PRO</span></h1>
                <div class="text-[10px] mono font-bold flex gap-2">
                    <span class="text-emerald-500">U: <b id="r-u">--</b></span>
                    <span class="text-blue-400">J: <b id="r-j">--</b></span>
                </div>
            </div>
            
            <button onclick="toggleTheme()" class="theme-btn shadow-sm">
                <i id="theme-icon" class="fas fa-lightbulb text-yellow-400"></i>
            </button>
        </div>
    </nav>

    <main class="px-2 mt-2">
        <div class="mb-3 px-1">
            <input type="text" id="search" placeholder="輸入名稱或代碼快速搜尋..." 
                class="w-full border-2 border-slate-700/30 rounded-2xl px-5 py-4 text-lg focus:border-blue-500 outline-none shadow-inner" 
                style="background: var(--card); color: var(--text);">
        </div>

        <div class="rounded-t-[2rem] overflow-hidden shadow-2xl" style="background: var(--card);">
            <div class="table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-center">
                            <th class="w-12">★</th>
                            <th class="text-left">商品資訊</th>
                            <th class="text-right">幣別</th>
                            <th class="text-right">原始</th>
                            <th class="text-right" style="background: rgba(0,0,0,0.15)">台幣估計</th>
                        </tr>
                    </thead>
                    <tbody id="list" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <button onclick="fetchData()" class="fab">
        <i id="sync-icon" class="fas fa-sync-alt text-2xl"></i>
    </button>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbznaiPus_QbMeKr-iuLSqcDvcxNuvuhB6RZrgK9VSeNh-IBskYRpCvaiugD24qXONM0/exec";
        let state = { 
            margins: [], 
            rates: {}, 
            favorites: JSON.parse(localStorage.getItem('favs') || '[]'),
            theme: localStorage.getItem('theme') || 'dark'
        };

        // 初始化主題
        if (state.theme === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('theme-icon').className = 'fas fa-moon text-slate-400';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            state.theme = isLight ? 'light' : 'dark';
            localStorage.setItem('theme', state.theme);
            document.getElementById('theme-icon').className = isLight ? 'fas fa-moon text-slate-400' : 'fas fa-lightbulb text-yellow-400';
            render(); // 重新渲染以更新樣式
        }

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                state.margins = data.margins;
                state.rates = data.rates;
                document.getElementById('r-u').innerText = data.rates.USD || "--";
                document.getElementById('r-j').innerText = data.rates.JPY || "--";
                render();
            } catch (e) { alert("同步失敗，請檢查網路或權限"); }
            finally { icon.classList.remove('fa-spin'); }
        }

        function toggleFav(id) {
            const idx = state.favorites.indexOf(id);
            if (idx > -1) state.favorites.splice(idx, 1);
            else state.favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(state.favorites));
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('list');
            
            const sorted = [...state.margins].sort((a, b) => {
                const aFav = state.favorites.includes(a.id) ? 0 : 1;
                const bFav = state.favorites.includes(b.id) ? 0 : 1;
                return aFav - bFav || a.id.localeCompare(b.id);
            });

            const filtered = sorted.filter(i => (i.name + i.id).toLowerCase().includes(q));

            container.innerHTML = filtered.map(item => {
                const isFav = state.favorites.includes(item.id);
                const rate = state.rates[item.cur] || 1;
                const twd = Math.round(item.margin * rate);
                return `
                    <tr class="hover:bg-blue-500/10 transition-colors">
                        <td class="text-center">
                            <button onclick="toggleFav('${item.id}')" class="p-2">
                                <i class="fas fa-star ${isFav ? 'favorited' : 'opacity-20'}"></i>
                            </button>
                        </td>
                        <td class="py-4">
                            <div class="font-black text-[1.2rem] leading-none mb-1 shadow-text">${item.name}</div>
                            <div class="text-[11px] mono font-bold">
                                <span class="bg-blue-500/20 text-blue-500 px-1 rounded">${item.id}</span>
                                <span style="color: var(--subtext)" class="ml-1">大點: ${item.pointVal || '--'}</span>
                            </div>
                        </td>
                        <td class="text-right text-[11px] mono font-bold" style="color: var(--subtext)">${item.cur}</td>
                        <td class="text-right text-base mono font-bold">${item.margin.toLocaleString()}</td>
                        <td class="text-right font-black text-[1.35rem]" style="color: var(--price)">
                            ${twd.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', render);
        fetchData();
    </script>
</body>
</html>
