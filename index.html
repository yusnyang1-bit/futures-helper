<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Margin Pro v2.2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0f1a] text-slate-300">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-[#0b0f1a]/80 backdrop-blur sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg"><i class="fas fa-database text-white"></i></div>
            <h1 class="text-xl font-bold tracking-tighter text-white">MARGIN <span class="text-blue-500 underline">PRO</span></h1>
        </div>
        <div class="flex gap-4 font-mono text-xs text-emerald-400 bg-white/5 px-4 py-2 rounded-full">
            USD: <span id="r-usd">--</span> | JPY: <span id="r-jpy">--</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div class="mb-8">
            <input type="text" id="search" placeholder="輸入搜尋商品名稱或代碼..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-blue-500 outline-none text-white">
        </div>

        <div id="list" class="grid gap-4">
            </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTCazcwF5h-hiP6yCn6FpM67j3mo8Jtek96z4lq01PrAz-np6cZo2uNapzWeXN2uFKmQ/exec";

        async function init() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                document.getElementById('r-usd').innerText = data.rates.USD;
                document.getElementById('r-jpy').innerText = data.rates.JPY;
                
                window.allData = data;
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('list');
            const filtered = window.allData.margins.filter(i => (i.name + i.id).toLowerCase().includes(q));

            container.innerHTML = filtered.map(item => {
                const twd = Math.round(item.margin * (window.allData.rates[item.cur] || 1));
                return `
                    <div class="bg-white/5 border border-white/10 p-6 rounded-3xl flex justify-between items-center hover:bg-white/10 transition-all">
                        <div>
                            <div class="text-xs text-blue-400 font-bold mb-1">${item.id}</div>
                            <div class="text-lg font-bold text-white">${item.name}</div>
                            <div class="text-xs text-slate-500 mt-1">原始保證金: ${item.cur} ${item.margin.toLocaleString()}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">台幣換算估計</div>
                            <div class="text-2xl font-black text-white">NT$ ${twd.toLocaleString()}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', render);
        init();
    </script>
</body>
</html>
