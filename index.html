<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Margin Pro v2.7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root { 
            --bg: #0f172a; --nav: #1e293b; --card: #1e293b; 
            --text: #f8fafc; --border: #334155; --accent: #3b82f6; --price: #38bdf8; 
        }
        .light-mode { 
            --bg: #f8fafc; --nav: #ffffff; --card: #ffffff; 
            --text: #0f172a; --border: #e2e8f0; --accent: #2563eb; --price: #1d4ed8; 
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: all 0.3s ease;
            user-select: none; /* 防止手機長按選取 */
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 手機端優化：點擊回饋 */
        .active-press:active { transform: scale(0.96); opacity: 0.8; }
        
        /* 清晰的表格容器 */
        .table-fixed-head { height: calc(100vh - 140px); overflow-y: auto; }
        
        /* 針對 AS WebView 優化 */
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="overflow-hidden">

    <nav class="sticky top-0 z-50 px-5 py-4 shadow-xl" style="background: var(--nav); border-bottom: 1px solid var(--border);">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                    <i class="fas fa- wallet text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black italic text-xl tracking-tighter leading-none">MARGIN <span class="text-blue-500">PRO</span></h1>
                    <div class="text-[10px] font-bold opacity-60 mt-1 flex gap-2">
                        <span class="bg-slate-700/50 px-1 rounded">v2.7.0</span>
                        <span>USD: <span id="r-u" class="text-blue-400">--</span></span>
                        <span>JPY: <span id="r-j" class="text-blue-400">--</span></span>
                    </div>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchData()" class="active-press text-blue-400 text-lg"><i id="sync-icon" class="fas fa-rotate"></i></button>
                <button onclick="toggleTheme()" class="active-press text-slate-400 text-lg"><i id="theme-icon" class="fas fa-circle-half-stroke"></i></button>
            </div>
        </div>
    </nav>

    <main class="p-2">
        <div class="relative mb-3">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 opacity-30 text-sm"></i>
            <input type="search" id="search" placeholder="搜尋代碼或商品名稱..." 
                class="w-full pl-11 pr-4 py-3 rounded-2xl border-0 focus:ring-2 focus:ring-blue-500 outline-none shadow-inner" 
                style="background: var(--card); color: var(--text);">
        </div>

        <div class="rounded-2xl overflow-hidden border shadow-2xl" style="border-color: var(--border); background: var(--card);">
            <div class="table-fixed-head no-scrollbar">
                <table class="w-full text-left">
                    <thead class="sticky top-0 z-10 shadow-sm" style="background: var(--accent);">
                        <tr class="text-[12px] uppercase tracking-wider text-white">
                            <th class="py-3 px-4 w-12 text-center">★</th>
                            <th class="py-3 px-2">商品 / 代碼</th>
                            <th class="py-3 px-4 text-right">台幣保證金 (TWD)</th>
                        </tr>
                    </thead>
                    <tbody id="list" class="divide-y divide-slate-700/30">
                        <tr><td colspan="3" class="py-20 text-center opacity-40 font-bold italic">LOADING ASSETS...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="safe-area-bottom"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbznaiPus_QbMeKr-iuLSqcDvcxNuvuhB6RZrgK9VSeNh-IBskYRpCvaiugD24qXONM0/exec";
        let state = { margins: [], rates: {}, favorites: JSON.parse(localStorage.getItem('favs') || '[]'), theme: localStorage.getItem('theme') || 'dark' };

        // 初始化主題
        if (state.theme === 'light') document.body.classList.add('light-mode');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            state.theme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
            localStorage.setItem('theme', state.theme);
        }

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                state.margins = data.margins;
                state.rates = data.rates;
                document.getElementById('r-u').innerText = data.rates.USD || "--";
                document.getElementById('r-j').innerText = data.rates.JPY || "--";
                render();
            } catch (e) {
                alert("網路連接失敗，請檢查網路狀態");
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function toggleFav(id) {
            const idx = state.favorites.indexOf(id);
            if (idx > -1) state.favorites.splice(idx, 1);
            else state.favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(state.favorites));
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('list');
            
            const filtered = state.margins
                .filter(i => (i.name + i.id).toLowerCase().includes(q))
                .sort((a, b) => {
                    const aFav = state.favorites.includes(a.id) ? 0 : 1;
                    const bFav = state.favorites.includes(b.id) ? 0 : 1;
                    return aFav - bFav || a.id.localeCompare(b.id);
                });

            container.innerHTML = filtered.map(item => {
                const isFav = state.favorites.includes(item.id);
                const rate = state.rates[item.cur] || 1;
                const twd = Math.round(item.margin * rate);
                const cleanName = item.name.replace(/\s*\(.*?\)\s*/g, '');

                return `
                <tr class="active-press transition-colors hover:bg-blue-500/5">
                    <td class="text-center py-4">
                        <button onclick="toggleFav('${item.id}')" class="w-full h-full">
                            <i class="fa-star ${isFav ? 'fas text-yellow-400' : 'far opacity-20'}"></i>
                        </button>
                    </td>
                    <td class="py-3 px-2">
                        <div class="font-bold text-[15px] leading-tight mb-1">${cleanName}</div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black bg-blue-500/10 text-blue-500 px-1.5 py-0.5 rounded">${item.id}</span>
                            <span class="text-[10px] opacity-40 font-mono">${item.cur} ${item.margin.toLocaleString()}</span>
                        </div>
                    </td>
                    <td class="py-3 px-4 text-right">
                        <div class="text-xl font-black tracking-tighter" style="color: var(--price)">
                            ${twd.toLocaleString()}
                        </div>
                        <div class="text-[9px] opacity-30 font-bold">大點: ${item.pointVal || '--'}</div>
                    </td>
                </tr>`;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', render);
        fetchData();
    </script>
</body>
</html>
