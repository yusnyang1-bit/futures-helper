<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Conversion v1.5.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center">
                <i class="fas fa-coins mr-3 text-yellow-400 text-2xl"></i>
                <div>
                    <h1 class="text-xl font-black italic tracking-widest text-indigo-400 uppercase">Margin Conversion</h1>
                    <p class="text-[10px] text-slate-400">Professional Edition v1.5.6</p>
                </div>
            </div>
            <div id="rate-bar" class="flex gap-4 text-xs font-mono bg-slate-800 px-5 py-2 rounded-xl border border-slate-700">
                USD: <span id="usd-val" class="text-green-400">--</span> | 
                JPY: <span id="jpy-val" class="text-green-400">--</span> | 
                HKD: <span id="hkd-val" class="text-green-400">--</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <div class="relative flex-grow">
                <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="搜尋 NQ, MNQ, 小道瓊, 日經..." 
                    class="w-full pl-12 pr-4 py-3.5 rounded-2xl border-0 shadow-sm ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button onclick="fetchData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-bold transition flex items-center justify-center shadow-lg min-w-[140px]">
                <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 同步數據
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-400 text-[11px] uppercase tracking-wider">
                        <tr>
                            <th class="p-5">商品名稱 (代碼)</th>
                            <th class="p-5 text-right">一大點價值</th>
                            <th class="p-5 text-right">原始保證金</th>
                            <th class="p-5 text-right bg-indigo-50 text-indigo-600">台幣換算 (預估)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        <tr><td colspan="4" class="p-20 text-center text-slate-400 italic">正在連線至 GAS API...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div id="status-info" class="mt-4 text-center text-[10px] text-slate-400"></div>
    </main>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbynqAOp3jlZDqLMCBLeso5kK-Zb1xul45SQzc-KTPj6Ol92oJlxM1_ZvjbRFii3CyfnEA/exec";

        let localState = {
            margins: [],
            rates: { "USD": 32.5, "JPY": 0.21, "HKD": 4.15 }
        };

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            
            try {
                const response = await fetch(GAS_API_URL);
                const rawData = await response.json();
                
                // --- 重要：自動解包邏輯 ---
                // 如果 GAS 回傳的是 { data: { margins: [...] } }，這裡會自動抓到
                const cleanData = rawData.margins ? rawData : (rawData.data || rawData);
                
                localState.margins = cleanData.margins || [];
                localState.rates = cleanData.rates || localState.rates;

                document.getElementById('usd-val').innerText = localState.rates.USD || '--';
                document.getElementById('jpy-val').innerText = localState.rates.JPY || '--';
                document.getElementById('hkd-val').innerText = localState.rates.HKD || '--';
                
                document.getElementById('status-info').innerText = "最後同步: " + (cleanData.lastUpdate || new Date().toLocaleTimeString());

                renderTable();
            } catch (e) {
                console.error("API 錯誤:", e);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="4" class="p-20 text-center text-red-400">讀取失敗：請檢查 GAS 權限是否設為所有人。</td></tr>`;
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function renderTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = localState.margins.filter(item => 
                (item.name + item.id).toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-20 text-center text-slate-400">未找到匹配商品</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(item => {
                const rate = localState.rates[item.cur] || 1;
                const twdValue = Math.round(item.margin * rate);

                return `
                    <tr class="hover:bg-indigo-50/30 transition-colors">
                        <td class="p-5">
                            <div class="font-bold text-slate-800">${item.name}</div>
                            <div class="text-[10px] text-slate-400 font-mono uppercase tracking-tighter">${item.id}</div>
                        </td>
                        <td class="p-5 text-right font-mono text-slate-500 text-sm italic">${item.pointVal || '--'}</td>
                        <td class="p-5 text-right font-mono font-bold text-slate-700">
                            <span class="text-[9px] text-slate-400 mr-1">${item.cur}</span>${item.margin.toLocaleString()}
                        </td>
                        <td class="p-5 text-right font-black text-indigo-700 bg-indigo-50/30 text-lg">
                            NT$ ${twdValue.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        window.onload = fetchData;
    </script>
</body>
</html>
