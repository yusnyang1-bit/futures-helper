<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Margin Conversion v1.7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center">
                <div class="bg-indigo-600 p-2 rounded-lg mr-3">
                    <i class="fas fa-robot text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter italic">AUTO MARGIN</h1>
                    <span id="ver-info" class="text-[9px] bg-slate-700 px-2 py-0.5 rounded text-slate-300">v1.7.0 Auto-Sync</span>
                </div>
            </div>
            
            <div class="flex gap-4 font-mono text-xs">
                <div class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700">
                    USD: <span id="usd-rate" class="text-green-400">--</span>
                </div>
                <div class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700">
                    JPY: <span id="jpy-rate" class="text-green-400">--</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex gap-4 mb-8">
            <div class="relative flex-grow">
                <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="輸入商品代碼或名稱 (如: NQ, MNQ)..." 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl border-0 shadow-inner ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <button onclick="fetchData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 rounded-2xl font-bold shadow-lg flex items-center">
                <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 同步最新
            </button>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50/50 border-b border-slate-100 text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                        <tr>
                            <th class="p-6">交易所商品</th>
                            <th class="p-6 text-right">大點價值</th>
                            <th class="p-6 text-right">原始保證金</th>
                            <th class="p-6 text-right bg-indigo-50/50 text-indigo-600">台幣估算</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50">
                        <tr><td colspan="4" class="p-20 text-center text-slate-300 italic">等待同步數據...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <p id="status-bar" class="text-center text-[10px] text-slate-400 mt-8 font-mono uppercase tracking-widest"></p>
    </main>

    <script>
        // 1. 填入你的 GAS URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycby09XQpvaaL53sA9KsG0DXWB9CaqzIJ2tT-4rN1UbUFNbsHEmpae1U1yivYmq-Mmv5iUg/exec";

        let localState = { margins: [], rates: {} };

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();

                localState.margins = data.margins;
                localState.rates = data.rates;

                // 更新頂部資訊
                document.getElementById('usd-rate').innerText = data.rates.USD;
                document.getElementById('jpy-rate').innerText = data.rates.JPY;
                document.getElementById('status-bar').innerText = "Last Sync: " + (data.lastUpdate || "Success");
                document.getElementById('ver-info').innerText = data.version || "v1.7.0";

                render();
            } catch (e) {
                alert("自動抓取連線失敗！請確保 GAS 部署為『所有人』。");
                console.error(e);
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = localState.margins.filter(i => (i.name + i.id).toLowerCase().includes(query));

            tbody.innerHTML = filtered.map(item => {
                const rate = localState.rates[item.cur] || 1;
                const twd = Math.round(item.margin * rate);
                return `
                    <tr class="hover:bg-indigo-50/30 transition-colors cursor-default">
                        <td class="p-6">
                            <div class="font-bold text-slate-800">${item.name}</div>
                            <div class="text-[10px] text-slate-400 font-mono">${item.id}</div>
                        </td>
                        <td class="p-6 text-right font-mono text-slate-500 text-sm italic">${item.pointVal}</td>
                        <td class="p-6 text-right font-mono font-bold text-slate-700">
                            <span class="text-[9px] text-slate-300 mr-1">${item.cur}</span>${item.margin.toLocaleString()}
                        </td>
                        <td class="p-6 text-right font-black text-indigo-700 bg-indigo-50/20 text-lg">
                            NT$ ${twd.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', render);
        window.onload = fetchData;
    </script>
</body>
</html>
