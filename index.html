<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Margin Monitor v2.4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#05070a] text-slate-200">

    <nav class="p-4 border-b border-white/10 bg-slate-900 shadow-2xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-black italic text-blue-500">MARGIN SYSTEM v2.4.0</h1>
            <div class="flex gap-4 font-mono text-xs">
                <span class="text-slate-400">USD: <b id="r-u" class="text-emerald-400">--</b></span>
                <span class="text-slate-400">JPY: <b id="r-j" class="text-emerald-400">--</b></span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <button onclick="loadData()" id="btn" class="w-full mb-6 bg-blue-600 p-4 rounded-xl font-bold flex items-center justify-center gap-2">
            <i id="icon" class="fas fa-sync"></i> 同步雲端試算表
        </button>

        <div class="bg-white/5 rounded-2xl overflow-hidden border border-white/10">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[10px] uppercase text-slate-500">
                    <tr>
                        <th class="p-4">商品 / 代碼</th>
                        <th class="p-4 text-right">原始保證金</th>
                        <th class="p-4 text-right text-blue-400">台幣估計</th>
                    </tr>
                </thead>
                <tbody id="list" class="divide-y divide-white/5 text-sm">
                    <tr><td colspan="3" class="p-10 text-center text-slate-500">等待同步...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="debug" class="mt-4 text-[10px] text-red-400 font-mono text-center"></div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbznaiPus_QbMeKr-iuLSqcDvcxNuvuhB6RZrgK9VSeNh-IBskYRpCvaiugD24qXONM0/exec";

        async function loadData() {
            const btn = document.getElementById('icon');
            btn.classList.add('fa-spin');
            try {
                const res = await fetch(API);
                const data = await res.json();
                
                if(data.error) {
                    document.getElementById('debug').innerText = "GAS錯誤: " + data.error;
                    return;
                }

                document.getElementById('r-u').innerText = data.rates.USD;
                document.getElementById('r-j').innerText = data.rates.JPY;

                const tbody = document.getElementById('list');
                tbody.innerHTML = data.margins.map(item => {
                    const rate = data.rates[item.cur] || 1;
                    const twd = Math.round(item.margin * rate);
                    return `
                        <tr class="hover:bg-white/5">
                            <td class="p-4">
                                <div class="font-bold">${item.name}</div>
                                <div class="text-[10px] text-slate-500">${item.id} (${item.pointVal})</div>
                            </td>
                            <td class="p-4 text-right font-mono">${item.margin.toLocaleString()} <small class="text-slate-500">${item.cur}</small></td>
                            <td class="p-4 text-right text-lg font-black text-blue-400">NT$ ${twd.toLocaleString()}</td>
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('debug').innerText = "連線失敗，請檢查網址或權限";
            } finally {
                btn.classList.remove('fa-spin');
            }
        }
    </script>
</body>
</html>
